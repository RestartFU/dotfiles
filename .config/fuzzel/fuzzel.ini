[main]
font=JetBrains Mono Nerd Font:size=14
dpi-aware=no
prompt="❯ "
icon-theme=hicolor
icons-enabled=no
fields=name,generic,comment,categories,filename,keywords
terminal=foot
width=95
horizontal-pad=18
vertical-pad=8
inner-pad=8

image-size-ratio=1
lines=18
[colors]
background=222222dd
text=eeeeeeff
match=875f5fff
selection=875f5fff
selection-text=eeeeeeff
selection-match=ffffffff
border=875f5fff

[border]
width=0
radius=0

[dmenu]
exit-immediately-if-empty=no
