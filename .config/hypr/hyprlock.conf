# Generated by ~/.config/hypr/scripts/theme-picker
background {
    path = /home/restart/.config/hyprland/themes/wallpapers/static/purple.png
    color = rgba(222222ff)
    blur_passes = 2
    blur_size = 4
}

label {
    text = $TIME
    color = rgba(eeeeeeff)
    font_size = 64
    position = 0, 100
    halign = center
    valign = center
}

label {
    text = Purple
    color = rgba(5f5f87ff)
    font_size = 16
    position = 0, 36
    halign = center
    valign = center
}

input-field {
    size = 220, 54
    outline_thickness = 3
    outer_color = rgba(5f5f87ff)
    inner_color = rgba(222222dd)
    font_color = rgba(eeeeeeff)
    check_color = rgba(5f5f87ff)
    fail_color = rgba(cc5555ff)
    placeholder_text = <span foreground="#eeeeee">password</span>
    position = 0, -100
    halign = center
    valign = center
}
